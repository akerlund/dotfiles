# ------------------------------------------------------------------------------
# Behaviour
# ------------------------------------------------------------------------------

# Automatically set window title
set -gw automatic-rename on
set -g  set-titles on

# Using 256 colors
set -g  default-terminal   "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Base index of windows and panes
set -g  base-index 1
set -g  pane-base-index 1

# Renumber windows when a window is closed
set -g  renumber-windows on

# History limit
set -g  history-limit 100000

# Delay for escape key press
set -gs escape-time 0

# Mouse mode (tmux 2.1 and above), cannot select text with mouse if this is on
set -g  mouse off

# Set the amount of time (ms) for which status line messages and other on-screen
# indicators are displayed. If set to 0, displayed until a key is pressed. 
set -g  display-time 800
set -g  display-panes-time 800

# Monitor and alert whenever the output changes
set -g  visual-activity on
set -gw monitor-activity on

# Monitor and alert whenever the output did not change for a while (seconds)
#set -g  visual-silence on
#set -gw monitor-silence 30

# See bells for non-current window only (other)
set -gw visual-bell on
set -gw bell-action other

# Show or hide the status line or specify its size. Using on gives a status
# line one row in height; 2, 3, 4 or 5 more rows.
set -g  status "on"

# Update the status every <arg> seconds
set -g  status-interval 5

set -g  status-justify "left"
set -gw window-status-separator ""

set -g  status-left-length "80"
set -g  status-right-length "80"

set -g  status-left-style none
set -g  status-right-style none

# ------------------------------------------------------------------------------
# Key Rebindings
# ------------------------------------------------------------------------------

# Reload config file
bind r source-file ~/.tmux.conf


# Split panes, using | -
bind < split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind-key C-p paste-buffer

# ------------------------------------------------------------------------------
# Nord Palette Reference:
# Polar Night:  #2e3440, #3b4252, #434c5e, #4c566a
# Snow Storm:   #d8dee9, #e5e9f0, #eceff4
# Frost:        #8fbcbb, #88c0d0, #81a1c1, #5e81ac
# Aurora:       #bf616a, #d08770, #ebcb8b, #a3be8c, #b48ead
# ------------------------------------------------------------------------------

set -g status-style "bg=#3b4252,fg=#eceff4"

# ------------------------------------------------------------------------------
# Left status
# ------------------------------------------------------------------------------

# Session name - Nord Frost (Blue)
set -g  status-left  "#[fg=#2e3440, bg=#81a1c1, bold] #S "
set -ga status-left  "#[fg=#81a1c1, bg=#3b4252, nobold, noitalics, nounderscore]"

# ------------------------------------------------------------------------------
# Window status
# ------------------------------------------------------------------------------

# Active Window - Nord Yellow (Aurora) and Nord Cyan (Frost)
set -gw  window-status-current-format "#[fg=#3b4252, bg=#ebcb8b, nobold, noitalics, nounderscore]"
set -gwa window-status-current-format "#[fg=#2e3440, bg=#ebcb8b] #I "
set -gwa window-status-current-format "#[fg=#2e3440, bg=#ebcb8b, bold] #W "
set -gwa window-status-current-format "#[fg=#ebcb8b, bg=#3b4252, nobold, noitalics, nounderscore]"

# Active Pane - Nord Blue (Frost)
set -gwa window-status-current-format "#[fg=#3b4252, bg=#88c0d0, nobold, noitalics, nounderscore]"
set -gwa window-status-current-format "#[fg=#2e3440, bg=#88c0d0] #P "
set -gwa window-status-current-format "#[fg=#88c0d0, bg=#3b4252, nobold, noitalics, nounderscore]"

# Inactive Window - Nord Grey/Blue
set -gw  window-status-format "#[fg=#3b4252, bg=#4c566a, noitalics]"
set -gwa window-status-format "#[fg=#d8dee9, bg=#4c566a] #I "
set -gwa window-status-format "#[fg=#d8dee9, bg=#4c566a] #W "
set -gwa window-status-format "#[fg=#4c566a, bg=#3b4252, noitalics]"

# ------------------------------------------------------------------------------
# Right status
# ------------------------------------------------------------------------------

# Date, time and hostname - Nord Night and Frost
set -g  status-right "#[fg=#434c5e, bg=#3b4252, bold, noitalics, nounderscore]"
set -ga status-right "#[fg=#d8dee9, bg=#434c5e] %Y-%m-%d  ⌚%H:%M "
set -ga status-right "#[fg=#81a1c1, bg=#434c5e, bold, noitalics, nounderscore]"
set -ga status-right "#[fg=#2e3440, bg=#81a1c1] #H "
