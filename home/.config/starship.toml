#format = "$username$hostname$directory$git_branch$git_status$python$custom$line_break$character"
format = "$username$hostname$directory$git_branch$git_status$python$custom$cmd_duration$time$line_break$character"
# AnvГӨnd en enkel symbol fГ¶r prompten
[character]
success_symbol = "[вқ„пёҸ вқҜ](bold #88C0D0)"
error_symbol = "[рҹ”Ҙ вқҜ](bold #BF616A)"

# Visa bara anvГӨndare om vi kГ¶r via SSH
[username]
show_always = false
style_user = "bold #81A1C1"
format = "[$user]($style)"

# Visa bara host om vi kГ¶r via SSH
[hostname]
ssh_only = true
format = "@[$hostname]($style) "

# Snyggare instГӨllning fГ¶r mappen
[directory]
truncation_length = 3 # Visar max 3 mappar bakГҘt (t.ex. ~/kod/projekt/src)
truncate_to_repo = true # Stannar trunkering vid git-rooten (vГӨldigt skГ¶nt)
style = "bold #81A1C1"
format = "[$path]($style)[$read_only]($read_only_style) "
#repo_indicator = "оӮ " # Visar en ikon om du ГӨr i ett git-repo
read_only = " у°Ңҫ"
truncation_symbol = "вҖҰ/"
repo_root_style = "bold #81A1C1" 
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[time]
disabled = false
format = "[уұ‘’ $time]($style) "
style = "bold #D8DEE9" # LjusgrГҘ Nord-fГӨrg
time_format = "%R" # 24-timmars klocka

[cmd_duration]
min_time = 2_000 # Visa bara om det tar mer ГӨn 2 sekunder
format = "[уұҺ« $duration]($style) "
style = "bold #EBCB8B" # Nord Gul

[git_status]
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
modified = "!"
untracked = "?"
stashed = "$"
style = "bold #BF616A" # Nord RГ¶d (fГ¶r att varna om osparade ГӨndringar)
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[git_branch]
symbol = "оӮ  "
style = "bold #8FBCBB"
format = "[$symbol$branch]($style) " # Г„ndra "on" till "via" eller ta bort helt

[sudo]
disabled = false
symbol = "уұ—Ј " # En skГ¶ld-ikon eller liknande (Nerd Font)
style = "bold #BF616A" # Nord RГ¶d
format = "[$symbol]($style)"

[python]
symbol = "рҹҗҚ "
style = "bold #EBCB8B"
format = "[${symbol}${pyenv_prefix}${version}]($style) "

[rust]
symbol = "рҹҰҖ "
style = "bold #D08770"

# C++
[c]
symbol = "оҳһ "
style = "bold #5E81AC" # Nord MГ¶rkblГҘ
format = "[$symbol($version)]($style) "

# SystemVerilog (Letar efter .sv eller .svh)
[custom.systemverilog]
command = "echo 'у°ҷ” '" # En kretssymbol eller liknande frГҘn Nerd Font
detect_extensions = ['sv', 'svh', 'v']
style = "bold #B48EAD" # Nord Lila
format = "[$symbol($output)]($style) "

# TCL (Letar efter .tcl filer)
[custom.tcl]
command = "echo 'у°ҹқ '"
detect_extensions = ['tcl']
style = "bold #81A1C1"
format = "[$symbol($output)]($style) "

# Markdown (Om du vill se nГӨr du editerar dokumentation)
[custom.markdown]
command = "echo 'у°Ҫӣ '"
detect_extensions = ['md']
style = "bold #EBCB8B" # Nord Gul
format = "[$symbol]($style) "


